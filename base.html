<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Commandes Fournisseurs{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #1a1a2e;
      --accent:  #e94560;
      --light-bg: #f4f6fb;
    }
    body { background: var(--light-bg); font-family: 'Segoe UI', sans-serif; }
    .sidebar {
      width: 230px; min-height: 100vh; background: var(--primary);
      position: fixed; top: 0; left: 0; z-index: 100;
      display: flex; flex-direction: column;
    }
    .sidebar .brand {
      padding: 24px 20px 16px;
      color: #fff; font-size: 1.1rem; font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .sidebar .brand span { color: var(--accent); }
    .sidebar .nav-link {
      color: rgba(255,255,255,.7); padding: 10px 20px;
      border-radius: 0; transition: all .2s;
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar .nav-link:hover, .sidebar .nav-link.active {
      color: #fff; background: rgba(255,255,255,.08);
      border-left: 3px solid var(--accent);
    }
    .main-content { margin-left: 230px; padding: 32px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .page-header h1 { font-size: 1.6rem; font-weight: 700; color: var(--primary); margin: 0; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .card-header { background: var(--primary); color: #fff; border-radius: 12px 12px 0 0 !important; padding: 14px 20px; }
    .badge-brouillon { background: #6c757d; }
    .badge-envoyee   { background: #0d6efd; }
    .badge-cloturee  { background: #198754; }
    .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; color: #888; }
    .btn-primary { background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: #2d2d50; border-color: #2d2d50; }
    .kpi-card { border-radius: 12px; padding: 20px; color: #fff; }
    .alert { border-radius: 10px; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="brand">📦 <span>Achat</span>Pro</div>
  <nav class="mt-2">
    <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
      <i class="bi bi-grid-1x2"></i> Tableau de bord
    </a>
    <a href="{{ url_for('fournisseurs') }}" class="nav-link {% if 'fournisseur' in request.endpoint %}active{% endif %}">
      <i class="bi bi-building"></i> Fournisseurs
    </a>
    <a href="{{ url_for('commandes') }}" class="nav-link {% if 'commande' in request.endpoint %}active{% endif %}">
      <i class="bi bi-cart3"></i> Commandes
    </a>
  </nav>
</div>

<div class="main-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'danger' if cat == 'error' else cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
